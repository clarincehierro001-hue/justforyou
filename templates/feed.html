<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f13;
  --surface: #18181f;
  --surface2: #22222c;
  --border: rgba(255,255,255,0.07);
  --accent: #7c6ef9;
  --accent2: #f97c6e;
  --text: #e8e8f0;
  --muted: #5a5a72;
  --tab-h: 52px;
  --radius: 18px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* subtle grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(124,110,249,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,110,249,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

.app {
  width: 100%;
  max-width: 780px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* BRAND */
.brand {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 22px;
  color: var(--text);
  letter-spacing: -0.5px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand span {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.brand-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

/* TABS */
.tabs {
  display: flex;
  gap: 4px;
  background: var(--surface);
  padding: 5px;
  border-radius: var(--radius) var(--radius) 0 0;
  border: 1px solid var(--border);
  border-bottom: none;
}

.tab {
  flex: 1;
  height: var(--tab-h);
  border: none;
  border-radius: calc(var(--radius) - 4px);
  background: transparent;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.3px;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  position: relative;
}
.tab:hover { color: var(--text); background: var(--surface2); }
.tab.active {
  background: var(--surface2);
  color: var(--text);
}
.tab.active::after {
  content: '';
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px; height: 2px;
  border-radius: 2px;
  background: var(--accent);
}
.tab-badge {
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  border-radius: 10px;
  padding: 1px 6px;
  display: none;
}
.tab-badge.show { display: inline; }

/* CHAT PANEL */
.panel {
  display: none;
  flex-direction: column;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 0 0 var(--radius) var(--radius);
  height: 68vh;
  overflow: hidden;
}
.panel.active { display: flex; }

/* PANEL HEADER */
.panel-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-meta { display: flex; align-items: center; gap: 10px; }
.online-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #4ade80;
  box-shadow: 0 0 6px #4ade80;
}
.panel-name {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}
.panel-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 1px;
}
.clear-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  padding: 5px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}
.clear-btn:hover { border-color: var(--accent2); color: var(--accent2); }

/* MESSAGES */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  scrollbar-width: thin;
  scrollbar-color: var(--surface2) transparent;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--muted);
}
.empty-icon { font-size: 36px; opacity: 0.4; }
.empty-text { font-size: 13px; opacity: 0.6; }

/* MESSAGE ROWS */
.row {
  display: flex;
  gap: 10px;
  animation: slideUp 0.2s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.row.mine { flex-direction: row-reverse; }

.avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  background: var(--surface2);
  align-self: flex-end;
}

.bubble-wrap { display: flex; flex-direction: column; gap: 3px; max-width: 68%; }
.row.mine .bubble-wrap { align-items: flex-end; }

.bubble {
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  background: var(--surface2);
  border: 1px solid var(--border);
  word-break: break-word;
}
.row.mine .bubble {
  background: var(--accent);
  border-color: transparent;
  color: #fff;
}

.time {
  font-size: 10px;
  color: var(--muted);
  padding: 0 4px;
}

/* INPUT AREA */
.input-area {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: center;
  background: var(--surface);
}

.msg-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 11px 18px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.msg-input::placeholder { color: var(--muted); }
.msg-input:focus { border-color: var(--accent); }

.send-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: #fff;
  font-size: 17px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
  box-shadow: 0 4px 14px rgba(124,110,249,0.4);
}
.send-btn:hover { transform: scale(1.08); background: #6a5ce8; }
.send-btn:active { transform: scale(0.95); }

/* MOBILE */
@media (max-width: 600px) {
  .panel { height: 62vh; }
  .bubble-wrap { max-width: 80%; }
  .brand { font-size: 18px; }
}
</style>
</head>
<body>

<div class="app">
  <div class="brand">
    <div class="brand-dot"></div>
    <span>Chatter</span>
  </div>

  <!-- TABS -->
  <div class="tabs" role="tablist">
    <button class="tab active" onclick="switchTab(0)" role="tab">
      💬 General <span class="tab-badge" id="badge0"></span>
    </button>
    <button class="tab" onclick="switchTab(1)" role="tab">
      🛠 Support <span class="tab-badge" id="badge1"></span>
    </button>
    <button class="tab" onclick="switchTab(2)" role="tab">
      🎲 Random <span class="tab-badge" id="badge2"></span>
    </button>
  </div>
  
  <h1>Chat Rooms</h1>
<form method="POST">
    <input name="name" placeholder="New room name" required>
    <button type="submit">Create Room</button>
</form>

<ul>
{% for room in rooms %}
    <li><a href="{{ url_for('room_feed', room_id=room.id) }}">{{ room.name }}</a></li>
{% endfor %}
</ul>

  <!-- PANELS -->
  <div class="panel active" id="panel0">
    <div class="panel-header">
      <div class="panel-meta">
        <div class="online-dot"></div>
        <div>
          <div class="panel-name">General</div>
          <div class="panel-sub">Open conversation</div>
        </div>
      </div>
      <button class="clear-btn" onclick="clearChat(0)">Clear chat</button>
    </div>
    <div class="messages" id="msgs0">
      <div class="empty-state">
        <div class="empty-icon">💬</div>
        <div class="empty-text">No messages yet. Say something!</div>
      </div>
    </div>
    <div class="input-area">
      <input class="msg-input" id="input0" type="text" placeholder="Type a message…" autocomplete="off">
      <button class="send-btn" onclick="send(0)">➤</button>
    </div>
  </div>

  <div class="panel" id="panel1">
    <div class="panel-header">
      <div class="panel-meta">
        <div class="online-dot"></div>
        <div>
          <div class="panel-name">Support</div>
          <div class="panel-sub">Get help here</div>
        </div>
      </div>
      <button class="clear-btn" onclick="clearChat(1)">Clear chat</button>
    </div>
    <div class="messages" id="msgs1">
      <div class="empty-state">
        <div class="empty-icon">🛠</div>
        <div class="empty-text">No messages yet. Say something!</div>
      </div>
    </div>
    <div class="input-area">
      <input class="msg-input" id="input1" type="text" placeholder="Type a message…" autocomplete="off">
      <button class="send-btn" onclick="send(1)">➤</button>
    </div>
  </div>

  <div class="panel" id="panel2">
    <div class="panel-header">
      <div class="panel-meta">
        <div class="online-dot"></div>
        <div>
          <div class="panel-name">Random</div>
          <div class="panel-sub">Anything goes</div>
        </div>
      </div>
      <button class="clear-btn" onclick="clearChat(2)">Clear chat</button>
    </div>
    <div class="messages" id="msgs2">
      <div class="empty-state">
        <div class="empty-icon">🎲</div>
        <div class="empty-text">No messages yet. Say something!</div>
      </div>
    </div>
    <div class="input-area">
      <input class="msg-input" id="input2" type="text" placeholder="Type a message…" autocomplete="off">
      <button class="send-btn" onclick="send(2)">➤</button>
    </div>
  </div>
</div>

<script>
let current = 0;

function switchTab(i) {
  document.querySelectorAll('.tab').forEach((t, idx) => t.classList.toggle('active', idx === i));
  document.querySelectorAll('.panel').forEach((p, idx) => p.classList.toggle('active', idx === i));
  current = i;
  // clear badge
  document.getElementById('badge' + i).classList.remove('show');
}

function now() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function send(i) {
  const input = document.getElementById('input' + i);
  const text = input.value.trim();
  if (!text) return;

  const box = document.getElementById('msgs' + i);
  const empty = box.querySelector('.empty-state');
  if (empty) empty.remove();

  const row = document.createElement('div');
  row.className = 'row mine';
  row.innerHTML = `
    <div class="bubble-wrap">
      <div class="bubble">${escHtml(text)}</div>
      <div class="time">${now()}</div>
    </div>
    <div class="avatar">🙂</div>
  `;
  box.appendChild(row);
  input.value = '';
  box.scrollTop = box.scrollHeight;
}

function clearChat(i) {
  const box = document.getElementById('msgs' + i);
  const icons = ['💬', '🛠', '🎲'];
  const labels = ['General', 'Support', 'Random'];
  box.innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">${icons[i]}</div>
      <div class="empty-text">No messages yet. Say something!</div>
    </div>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Enter key to send
document.querySelectorAll('.msg-input').forEach((inp, i) => {
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); send(i); }
  });
});
</script>
</body>
</html>
