<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operation Team</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #2d3436;
            --primary: #2c3e50;
            --accent: #3498db;
            --border: #e0e6ed;
        }

        /* Dark Mode */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1e1e2f;
                --card: #2b2b3c;
                --text: #f1f1f1;
                --primary: #111827;
                --border: #3a3a4f;
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* HEADER */
        header {
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        header h2 {
            margin: 0;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        nav a {
            color: #dfe6e9;
            margin-left: 1rem;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        nav a:hover {
            color: white;
        }

        /* MAIN */
        main {
            padding: 2rem 1rem;
            max-width: 1100px;
            margin: auto;
        }

        .card {
            background: var(--card);
            border-radius: 14px;
            padding: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            border: 1px solid var(--border);
            animation: fadeIn 0.4s ease;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.85rem;
            color: #888;
        }

        /* UTILITIES */
        .btn {
            display: inline-block;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* MOBILE */
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                align-items: flex-start;
            }

            nav {
                margin-top: 0.5rem;
            }

            .card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h2>Operation Team</h2>
        <nav>
            <a href="#">Dashboard</a>
            <a href="#">Teams</a>
            <a href="#">Reports</a>
            <a href="#">Settings</a>
        </nav>
    </header>

    <main>
        <div class="card">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer>
        &copy; {{ year if year else "2026" }} Operation Team. All rights reserved.
    </footer>

</body>
</html>
